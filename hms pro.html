        DB.medicines.delete(id);
        Utils.toast.success('Medicine removed from inventory.');
        Pharmacy.load();
      }
    );
  },

  openSaleModal: (medId) => {
    const med = DB.medicines.getById(medId);
    if (!med) return;

    if (med.quantity === 0) {
      Utils.toast.error(`${med.name} is out of stock!`);
      return;
    }

    const modal = document.createElement('div');
    modal.className = 'modal-overlay open';
    modal.id = 'sale-modal-dynamic';

    // Get patients for dropdown
    const patients = DB.patients.getAll();

    modal.innerHTML = `
      <div class="modal modal-sm">
        <div class="modal-header">
          <div class="modal-title">💊 Process Sale</div>
          <button class="modal-close" onclick="document.getElementById('sale-modal-dynamic').remove()">✕</button>
        </div>
        <div class="modal-body">
          <div style="background:var(--bg-elevated);border-radius:var(--radius-md);padding:12px;margin-bottom:16px">
            <div style="font-weight:700;color:var(--text-primary)">${med.name}</div>
            <div style="font-size:0.8rem;color:var(--text-secondary)">${med.category} · ${Utils.formatCurrency(med.price)} per unit</div>
            <div style="font-size:0.8rem;margin-top:6px">Stock: <strong style="color:${med.quantity <= (med.threshold||10)?'var(--danger)':'var(--success)'}">${med.quantity} units</strong></div>
          </div>
          <div class="form-group mb-3">
            <label class="form-label">Patient (optional)</label>
            <select id="sale-patient" class="form-control">
              <option value="">— Walk-in Customer —</option>
              ${patients.map(p => `<option value="${p.id}">${p.name} (${p.id})</option>`).join('')}
            </select>
          </div>
          <div class="form-group mb-3">
            <label class="form-label">Quantity <span class="required">*</span></label>
            <input type="number" id="sale-qty" class="form-control" value="1" min="1" max="${med.quantity}" oninput="updateSaleTotal('${med.price}')" />
          </div>
          <div style="text-align:right;padding:12px;background:var(--bg-elevated);border-radius:var(--radius-md)">
            Total: <strong id="sale-total-display" style="color:var(--primary);font-size:1.1rem">${Utils.formatCurrency(med.price)}</strong>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="document.getElementById('sale-modal-dynamic').remove()">Cancel</button>
          <button class="btn btn-primary" onclick="Pharmacy.processSale('${medId}')">✓ Process Sale</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  },

  processSale: (medId) => {
    const med = DB.medicines.getById(medId);
    const qty = parseInt(document.getElementById('sale-qty')?.value) || 0;
    const patientId = document.getElementById('sale-patient')?.value;

    if (!qty || qty <= 0) { Utils.toast.error('Invalid quantity.'); return; }
    if (qty > med.quantity) { Utils.toast.error(`Only ${med.quantity} units available.`); return; }

    const patient = patientId ? DB.patients.getById(patientId) : null;
    const session = DB.session.get();

    // Deduct stock
    DB.medicines.update(medId, { quantity: med.quantity - qty });

    // Record sale
    const sale = {
      id: 'SALE-' + Date.now().toString().slice(-5),
      medicineId: medId,
      medicineName: med.name,
      quantity: qty,
      unitPrice: med.price,
      total: +(med.price * qty).toFixed(2),
      patientId: patient?.id || null,
      patientName: patient?.name || 'Walk-in',
      processedBy: session?.name || 'Staff',
      date: Utils.now(),
    };

    DB.sales.insert(sale);
    Utils.toast.success(`Sale processed! Total: ${Utils.formatCurrency(sale.total)}`);

    // Remove sale modal
    const saleModal = document.getElementById('sale-modal-dynamic');
    if (saleModal) saleModal.remove();

    Pharmacy.load();
    Pharmacy.loadSales();
  },

  showTab: (tabId, btn) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const tab = document.getElementById(tabId);
    if (tab) tab.classList.add('active');
    if (btn) btn.classList.add('active');
  },
};

function updateSaleTotal(price) {
  const qty = parseInt(document.getElementById('sale-qty')?.value) || 0;
  const total = qty * parseFloat(price);
  const el = document.getElementById('sale-total-display');
  if (el) el.textContent = Utils.formatCurrency(total);
}

</script>
<script>
// =========================================
// HMS — Reports Module
// =========================================

const Reports = {

  charts: {},

  init: () => {
    if (!Auth.hasRole('admin')) {
      Utils.toast.error('Admin access required.');
      App.navigate('dashboard');
      return;
    }
    renderTopbar('Reports & Analytics', 'Hospital performance insights and data exports');

    Reports.renderSummaryStats();
    if (typeof Chart !== 'undefined') {
      setTimeout(() => {
        Reports.renderRevenueChart();
        Reports.renderAppointmentsChart();
        Reports.renderDeptChart();
        Reports.renderPharmacyChart();
      }, 100);
    }
    Reports.renderPatientReport();
    Reports.renderAppointmentReport();
    Reports.renderRevenueReport();
    Reports.renderPharmacyReport();
  },

  renderSummaryStats: () => {
    const stats = DB.analytics.getDashboardStats();
    const aptStats = DB.analytics.getAppointmentStats();
    const container = document.getElementById('summary-stats');
    if (!container) return;

    container.innerHTML = `
      <div class="stat-card teal"><div class="stat-icon">👥</div><div class="stat-info"><div class="stat-label">Total Patients</div><div class="stat-value">${stats.totalPatients}</div></div></div>
      <div class="stat-card purple"><div class="stat-icon">👨‍⚕️</div><div class="stat-info"><div class="stat-label">Total Doctors</div><div class="stat-value">${stats.totalDoctors}</div></div></div>
      <div class="stat-card green"><div class="stat-icon">💰</div><div class="stat-info"><div class="stat-label">Total Revenue</div><div class="stat-value" style="font-size:1.25rem">${Utils.formatCurrency(stats.totalRevenue)}</div></div></div>
      <div class="stat-card amber"><div class="stat-icon">📅</div><div class="stat-info"><div class="stat-label">Total Appointments</div><div class="stat-value">${aptStats.total}</div></div></div>
      <div class="stat-card teal"><div class="stat-icon">✅</div><div class="stat-info"><div class="stat-label">Completed Appts</div><div class="stat-value">${aptStats.completed}</div></div></div>
      <div class="stat-card red"><div class="stat-icon">⚠️</div><div class="stat-info"><div class="stat-label">Low Stock Alerts</div><div class="stat-value">${stats.lowStockMeds}</div></div></div>
    `;
  },

  renderRevenueChart: () => {
    const ctx = document.getElementById('report-revenue-chart');
    if (!ctx) return;

    const months = [];
    const data = [];
    const now = new Date();
    const monthly = DB.invoices.getMonthlyRevenue();

    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      months.push(d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
      data.push(monthly[key] || 0);
    }

    if (Reports.charts.revenue) Reports.charts.revenue.destroy();
    Reports.charts.revenue = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: months,
        datasets: [{
          label: 'Revenue ($)',
          data,
          backgroundColor: 'rgba(0,194,203,0.7)',
          borderColor: 'var(--primary)',
          borderWidth: 1,
          borderRadius: 6,
        }],
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false } },
          y: { grid: { color: 'rgba(48,54,61,0.5)' }, ticks: { callback: v => '$' + v.toLocaleString() } },
        },
      },
    });
  },

  renderAppointmentsChart: () => {
    const ctx = document.getElementById('report-appts-chart');
    if (!ctx) return;

    const aptStats = DB.analytics.getAppointmentStats();
    if (Reports.charts.apts) Reports.charts.apts.destroy();
    Reports.charts.apts = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Completed', 'Pending', 'Confirmed', 'Cancelled'],
        datasets: [{
          data: [aptStats.completed, aptStats.pending, aptStats.confirmed, aptStats.cancelled],
          backgroundColor: ['#22C55E', '#F59E0B', '#3B82F6', '#EF4444'],
          borderWidth: 0,
        }],
      },
      options: {
        responsive: true,
        cutout: '70%',
        plugins: {
          legend: { position: 'bottom', labels: { color: '#8B949E', padding: 12, font: { size: 11 } } },
        },
      },
    });
  },

  renderDeptChart: () => {
    const ctx = document.getElementById('report-dept-chart');
    if (!ctx) return;

    const depts = DB.departments.getAll();
    const aptsByDept = {};
    DB.appointments.getAll().forEach(a => {
      aptsByDept[a.department] = (aptsByDept[a.department] || 0) + 1;
    });

    if (Reports.charts.dept) Reports.charts.dept.destroy();
    Reports.charts.dept = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: depts.map(d => d.name),
        datasets: [{
          data: depts.map(d => aptsByDept[d.name] || 0),
          backgroundColor: [
            'rgba(0,194,203,0.7)', 'rgba(108,99,255,0.7)', 'rgba(34,197,94,0.7)',
            'rgba(245,158,11,0.7)', 'rgba(239,68,68,0.7)', 'rgba(59,130,246,0.7)',
            'rgba(236,72,153,0.7)', 'rgba(20,184,166,0.7)',
          ],
          borderRadius: 6,
        }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(48,54,61,0.5)' }, beginAtZero: true },
          y: { grid: { display: false } },
        },
      },
    });
  },

  renderPharmacyChart: () => {
    const ctx = document.getElementById('report-pharmacy-chart');
    if (!ctx) return;

    const meds = DB.medicines.getAll();
    const categories = {};
    meds.forEach(m => { categories[m.category] = (categories[m.category] || 0) + 1; });

    if (Reports.charts.pharmacy) Reports.charts.pharmacy.destroy();
    Reports.charts.pharmacy = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: Object.keys(categories),
        datasets: [{
          data: Object.values(categories),
          backgroundColor: [
            '#00C2CB','#6C63FF','#22C55E','#F59E0B','#EF4444',
            '#3B82F6','#EC4899','#14B8A6','#F97316','#8B5CF6',
          ],
          borderWidth: 0,
        }],
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'right', labels: { color: '#8B949E', font: { size: 11 } } },
        },
      },
    });
  },

  renderPatientReport: () => {
    const patients = DB.patients.getAll();
    const tbody = document.getElementById('report-patients-tbody');
    if (!tbody) return;

    const genderCount = {};
    const bloodCount = {};
    patients.forEach(p => {
      genderCount[p.gender] = (genderCount[p.gender] || 0) + 1;
      bloodCount[p.bloodGroup] = (bloodCount[p.bloodGroup] || 0) + 1;
    });

    const summaryEl = document.getElementById('patient-report-summary');
    if (summaryEl) {
      summaryEl.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
          ${Object.entries(genderCount).map(([g,c]) => `
            <div style="background:var(--bg-elevated);border-radius:var(--radius-md);padding:12px;text-align:center">
              <div style="font-size:1.5rem;font-weight:800;color:var(--primary)">${c}</div>
              <div style="font-size:0.75rem;color:var(--text-secondary)">${g}</div>
            </div>
          `).join('')}
          ${Object.entries(bloodCount).slice(0,2).map(([b,c]) => `
            <div style="background:var(--bg-elevated);border-radius:var(--radius-md);padding:12px;text-align:center">
              <div style="font-size:1.5rem;font-weight:800;color:var(--accent)">${c}</div>
              <div style="font-size:0.75rem;color:var(--text-secondary)">Blood ${b}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    tbody.innerHTML = patients.slice(0, 15).map(p => `
      <tr>
        <td><span class="badge badge-primary" style="font-size:0.7rem">${p.id}</span></td>
        <td style="font-weight:600;color:var(--text-primary)">${p.name}</td>
        <td>${p.age}</td>
        <td>${p.gender}</td>
        <td>${Utils.bloodGroupBadge(p.bloodGroup)}</td>
        <td>${p.phone}</td>
        <td>${Utils.statusBadge(p.status || 'outpatient')}</td>
        <td style="font-size:0.8rem">${Utils.formatDate(p.createdAt)}</td>
      </tr>
    `).join('');
  },

  renderAppointmentReport: () => {
    const appointments = DB.appointments.getAll();
    const tbody = document.getElementById('report-apts-tbody');
    if (!tbody) return;

    tbody.innerHTML = appointments.slice(0, 15).map(a => `
      <tr>
        <td><span class="badge badge-muted" style="font-size:0.7rem">${a.id}</span></td>
        <td style="font-weight:600;color:var(--text-primary)">${a.patientName}</td>
        <td>${a.doctorName}</td>
        <td>${a.department}</td>
        <td>${Utils.formatDate(a.date)}</td>
        <td>${Utils.statusBadge(a.status)}</td>
        <td style="font-weight:700;color:var(--primary)">${Utils.formatCurrency(a.fee)}</td>
      </tr>
    `).join('');
  },

  renderRevenueReport: () => {
    const invoices = DB.invoices.getAll().filter(i => i.status === 'paid');
    const tbody = document.getElementById('report-revenue-tbody');
    if (!tbody) return;

    tbody.innerHTML = invoices.slice(0, 15).map(inv => `
      <tr>
        <td><span class="badge badge-primary" style="font-size:0.7rem">${inv.id}</span></td>
        <td style="font-weight:600;color:var(--text-primary)">${inv.patientName}</td>
        <td>${Utils.formatDate(inv.date)}</td>
        <td style="font-size:0.8rem;color:var(--text-secondary)">${(inv.items||[]).map(i=>i.description).join(', ')}</td>
        <td style="font-weight:700;color:var(--success)">${Utils.formatCurrency(inv.total)}</td>
        <td><span class="badge badge-muted">${inv.method?.replace('_',' ').toUpperCase() || '—'}</span></td>
      </tr>
    `).join('');
  },

  renderPharmacyReport: () => {
    const medicines = DB.medicines.getAll();
    const tbody = document.getElementById('report-pharmacy-tbody');
    if (!tbody) return;

    tbody.innerHTML = medicines.map(m => {
      const status = m.quantity <= (m.threshold||10) ? '<span class="badge badge-danger">⚠ Low</span>'
                   : Utils.isExpired(m.expiryDate) ? '<span class="badge badge-danger">💀 Expired</span>'
                   : Utils.isExpiringSoon(m.expiryDate,30) ? '<span class="badge badge-warning">⏳ Expiring</span>'
                   : '<span class="badge badge-success">✓ OK</span>';
      return `
        <tr>
          <td style="font-weight:600;color:var(--text-primary)">${m.name}</td>
          <td>${m.category}</td>
          <td style="text-align:center;font-weight:700;color:${m.quantity<=(m.threshold||10)?'var(--danger)':'var(--text-primary)'}">${m.quantity}</td>
          <td style="font-weight:600;color:var(--primary)">${Utils.formatCurrency(m.price)}</td>
          <td>${Utils.formatDate(m.expiryDate)}</td>
          <td>${status}</td>
          <td style="font-weight:600">${Utils.formatCurrency(m.price * m.quantity)}</td>
        </tr>
      `;
    }).join('');
  },

  printSection: (sectionId) => {
    const el = document.getElementById(sectionId);
    if (el) Utils.printElement(el);
  },

  showTab: (tabId, btn) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const tab = document.getElementById(tabId);
    if (tab) tab.classList.add('active');
    if (btn) btn.classList.add('active');
  },
};

</script>
<script>
// =========================================
// HMS — User Accounts Module (admin only)
// =========================================

const Users = {
  state: { list: [] },

  init: () => {
    if (!Auth.hasRole('admin')) {
      Utils.toast.error('Admin access required.');
      App.navigate('dashboard');
      return;
    }
    renderTopbar('User Accounts', 'Create and manage staff login accounts');
    Users.load();
  },

  load: () => {
    Users.state.list = DB.users.getAll();
    Users.renderTable();
  },

  renderTable: () => {
    const container = document.getElementById('users-list');
    if (!container) return;
    const session = DB.session.get();
    const list = Users.state.list;

    if (list.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔐</div><h4>No accounts yet</h4></div>`;
      return;
    }

    container.innerHTML = list.map(u => `
      <div class="user-row">
        <div class="avatar" style="background:${Utils.avatarColor(u.name)}">${Utils.initials(u.name)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;color:var(--text-primary)">${u.name} ${u.id === session?.userId ? '<span class="badge badge-muted" style="margin-left:6px">You</span>' : ''}</div>
          <div style="font-size:0.8rem;color:var(--text-secondary)">${u.email}</div>
        </div>
        <span class="badge badge-primary">${Auth.ROLE_META[u.role]?.icon || ''} ${Auth.ROLE_META[u.role]?.label || u.role}</span>
        ${Utils.statusBadge(u.active ? 'active' : 'inactive')}
        <div class="table-actions">
          ${u.id !== session?.userId ? `
            <button class="btn btn-sm btn-secondary" onclick="Users.toggleActive('${u.id}')" title="${u.active ? 'Deactivate' : 'Activate'}">
              ${u.active ? '⏸ Deactivate' : '▶ Activate'}
            </button>
            <button class="btn btn-sm btn-danger" onclick="Users.delete('${u.id}')" title="Delete">🗑</button>
          ` : '<span style="font-size:0.75rem;color:var(--text-muted)">Current session</span>'}
        </div>
      </div>
    `).join('');
  },

  openModal: () => {
    const form = document.getElementById('user-form');
    if (form) form.reset();
    document.querySelectorAll('#role-pick-grid .role-pick-card').forEach(c => c.classList.remove('selected'));
    Users.selectedRole = null;
    const meter = document.getElementById('user-pw-meter-fill');
    if (meter) meter.style.width = '0%';
    Utils.openModal('user-modal');
  },

  selectedRole: null,

  pickRole: (role, el) => {
    Users.selectedRole = role;
    document.querySelectorAll('#role-pick-grid .role-pick-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  },

  checkStrength: () => {
    const val = document.getElementById('user-password')?.value || '';
    const fill = document.getElementById('user-pw-meter-fill');
    if (!fill) return;
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const pct = [0, 25, 50, 75, 100][score];
    const colors = ['var(--danger)', 'var(--danger)', 'var(--warning)', 'var(--primary)', 'var(--success)'];
    fill.style.width = pct + '%';
    fill.style.background = colors[score];
  },

  save: () => {
    const name = document.getElementById('user-name')?.value.trim();
    const email = document.getElementById('user-email')?.value.trim();
    const phone = document.getElementById('user-phone')?.value.trim();
    const password = document.getElementById('user-password')?.value;

    if (!name || !email || !password) {
      Utils.toast.error('Please fill all required fields.');
      return;
    }
    if (!Users.selectedRole) {
      Utils.toast.error('Please select a role for this account.');
      return;
    }

    const result = Auth.register({ name, email, password, role: Users.selectedRole, phone });
    if (!result.success) {
      Utils.toast.error(result.error);
      return;
    }

    Utils.toast.success(`Account created for ${name}!`);
    Utils.closeModal('user-modal');
    Users.load();
  },

  toggleActive: (id) => {
    const user = DB.users.getById(id);
    if (!user) return;
    DB.users.update(id, { active: !user.active });
    Utils.toast.success(`${user.name} ${!user.active ? 'activated' : 'deactivated'}.`);
    Users.load();
  },

  delete: (id) => {
    const user = DB.users.getById(id);
    Utils.confirm(
      `Delete account <strong>${user?.name}</strong> (${user?.email})? This cannot be undone.`,
      () => {
        DB.users.delete(id);
        Utils.toast.success('Account deleted.');
        Users.load();
      }
    );
  },
};

</script>
<script>
  App.init();
</script>
