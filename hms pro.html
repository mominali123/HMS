        <div class="stat-card amber animate-fade-in" style="animation-delay:0.4s">
          <div class="stat-icon">💊</div>
          <div class="stat-info">
            <div class="stat-label">Expiring Meds</div>
            <div class="stat-value" id="stat-expiring">0</div>
            <div class="stat-change ${stats.expiringMeds > 0 ? 'down' : ''}">Within 30 days</div>
          </div>
        </div>
      </div>

      <!-- Charts + Tables Row -->
      <div class="grid gap-6" style="grid-template-columns: 2fr 1fr; margin-bottom: var(--space-6);">
        <!-- Revenue Chart -->
        <div class="card animate-fade-in" style="animation-delay:0.45s">
          <div class="card-header">
            <div class="card-title">📈 Revenue Trend (6 Months)</div>
            <span class="badge badge-success">↑ Growing</span>
          </div>
          <div class="card-body">
            <canvas id="revenueChart" height="220"></canvas>
          </div>
        </div>

        <!-- Appointment Status Donut -->
        <div class="card animate-fade-in" style="animation-delay:0.5s">
          <div class="card-header">
            <div class="card-title">📅 Appointment Status</div>
          </div>
          <div class="card-body">
            <canvas id="aptStatusChart" height="220"></canvas>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:16px;">
              <div style="text-align:center">
                <div style="font-weight:700; color: var(--warning); font-size:1.25rem">${aptStats.pending}</div>
                <div style="font-size:0.72rem; color:var(--text-secondary)">Pending</div>
              </div>
              <div style="text-align:center">
                <div style="font-weight:700; color: var(--info); font-size:1.25rem">${aptStats.confirmed}</div>
                <div style="font-size:0.72rem; color:var(--text-secondary)">Confirmed</div>
              </div>
              <div style="text-align:center">
                <div style="font-weight:700; color: var(--success); font-size:1.25rem">${aptStats.completed}</div>
                <div style="font-size:0.72rem; color:var(--text-secondary)">Completed</div>
              </div>
              <div style="text-align:center">
                <div style="font-weight:700; color: var(--danger); font-size:1.25rem">${aptStats.cancelled}</div>
                <div style="font-size:0.72rem; color:var(--text-secondary)">Cancelled</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Today's Appointments + Alerts -->
      <div class="grid gap-6" style="grid-template-columns: 3fr 2fr;">
        <!-- Today's Appointments -->
        <div class="card animate-fade-in" style="animation-delay:0.55s">
          <div class="card-header">
            <div class="card-title">📅 Today's Appointments</div>
            <a href="appointments.html" class="btn btn-sm btn-secondary">View All</a>
          </div>
          <div id="today-appointments-list">
            <div class="empty-state" style="padding:24px">
              <div class="empty-icon">📭</div>
              <h4>No appointments today</h4>
            </div>
          </div>
        </div>

        <!-- Alerts Panel -->
        <div class="card animate-fade-in" style="animation-delay:0.6s">
          <div class="card-header">
            <div class="card-title">🚨 Alerts</div>
          </div>
          <div class="card-body" id="alerts-panel" style="padding:0;"></div>
        </div>
      </div>

      <!-- Department Chart -->
      <div class="card animate-fade-in mt-6" style="animation-delay:0.65s">
        <div class="card-header">
          <div class="card-title">🏥 Appointments by Department</div>
        </div>
        <div class="card-body">
          <canvas id="deptChart" height="100"></canvas>
        </div>
      </div>
    `;

    // Animate counters
    Utils.animateCounter(document.getElementById('stat-patients'), stats.totalPatients);
    Utils.animateCounter(document.getElementById('stat-doctors'), stats.totalDoctors);
    Utils.animateCounter(document.getElementById('stat-today-apts'), stats.todayAppointments);
    Utils.animateCounter(document.getElementById('stat-low-stock'), stats.lowStockMeds);
    Utils.animateCounter(document.getElementById('stat-admissions'), stats.activeAdmissions);
    Utils.animateCounter(document.getElementById('stat-expiring'), stats.expiringMeds);

    // Revenue counter
    const revenueEl = document.getElementById('stat-revenue');
    if (revenueEl) {
      let val = 0;
      const target = stats.totalRevenue;
      const step = target / 60;
      const timer = setInterval(() => {
        val += step;
        if (val >= target) { val = target; clearInterval(timer); }
        revenueEl.textContent = '$' + Math.floor(val).toLocaleString();
      }, 16);
    }

    // Today's appointments
    Dashboard.renderTodayAppointments();

    // Alerts
    Dashboard.renderAlerts();

    // Charts (Chart.js)
    Dashboard.renderCharts(aptStats);
  },

  renderTodayAppointments: () => {
    const todayApts = DB.appointments.getToday().slice(0, 6);
    const container = document.getElementById('today-appointments-list');
    if (!container) return;

    if (todayApts.length === 0) {
      container.innerHTML = `<div class="empty-state" style="padding:24px"><div class="empty-icon">📭</div><h4>No appointments today</h4></div>`;
      return;
    }

    container.innerHTML = todayApts.map(apt => `
      <div style="display:flex; align-items:center; gap:12px; padding:12px 20px; border-bottom:1px solid var(--border); transition: background var(--transition-fast);" 
           onmouseover="this.style.background='var(--bg-glass)'" onmouseout="this.style.background=''">
        <div class="avatar" style="background:${Utils.avatarColor(apt.patientName)}">
          ${Utils.initials(apt.patientName)}
        </div>
        <div style="flex:1; min-width:0;">
          <div style="font-weight:600; font-size:0.875rem; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${apt.patientName}</div>
          <div style="font-size:0.75rem; color:var(--text-secondary);">${apt.doctorName} · ${apt.department}</div>
        </div>
        <div style="text-align:right; flex-shrink:0;">
          <div style="font-size:0.8rem; font-weight:600; color:var(--primary);">${Utils.formatTime(apt.time)}</div>
          ${Utils.statusBadge(apt.status)}
        </div>
      </div>
    `).join('');
  },

  renderAlerts: () => {
    const container = document.getElementById('alerts-panel');
    if (!container) return;

    const alerts = [];
    const lowStock = DB.medicines.getLowStock();
    const expiring = DB.medicines.getExpiring(30);
    const expired = DB.medicines.getExpired();
    const pending = DB.appointments.getByStatus('pending').slice(0, 3);

    lowStock.forEach(m => {
      alerts.push({ type: 'danger', icon: '💊', msg: `Low stock: ${m.name} (${m.quantity} left)`, action: 'pharmacy.html' });
    });
    expired.forEach(m => {
      alerts.push({ type: 'danger', icon: '⚠️', msg: `Expired: ${m.name}`, action: 'pharmacy.html' });
    });
    expiring.filter(m => !expired.find(e => e.id === m.id)).forEach(m => {
      const days = Utils.daysUntil(m.expiryDate);
      alerts.push({ type: 'warning', icon: '⏳', msg: `${m.name} expires in ${days} days`, action: 'pharmacy.html' });
    });
    pending.forEach(a => {
      alerts.push({ type: 'info', icon: '📅', msg: `Pending: ${a.patientName} with ${a.doctorName}`, action: 'appointments.html' });
    });

    if (alerts.length === 0) {
      container.innerHTML = `<div class="empty-state" style="padding:24px"><div class="empty-icon">✅</div><h4>No alerts! All clear</h4></div>`;
      return;
    }

    container.innerHTML = alerts.slice(0, 8).map(a => `
      <a href="${a.action}" style="display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); text-decoration:none; transition:background var(--transition-fast);"
         onmouseover="this.style.background='var(--bg-glass)'" onmouseout="this.style.background=''">
        <div class="alert-${a.type}" style="width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;padding:0;margin:0;border:none;">
          ${a.icon}
        </div>
        <span style="font-size:0.8rem; color:var(--text-secondary);">${a.msg}</span>
      </a>
    `).join('');
  },

  renderCharts: (aptStats) => {
    if (typeof Chart === 'undefined') {
      console.warn('Chart.js not loaded');
      return;
    }

    Chart.defaults.color = '#8B949E';
    Chart.defaults.borderColor = 'rgba(48,54,61,0.8)';

    // Revenue Chart (real data only — no synthetic noise)
    const months = [];
    const now = new Date();
    const monthlyRevenue = DB.invoices.getMonthlyRevenue();
    const revenueData = [];
    for (let i = 5; i >= 0; i--) {
      const month = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${month.getFullYear()}-${String(month.getMonth() + 1).padStart(2, '0')}`;
      months.push(month.toLocaleDateString('en-US', { month: 'short' }));
      revenueData.push(monthlyRevenue[key] || 0);
    }

    const revCtx = document.getElementById('revenueChart');
    if (revCtx) {
      new Chart(revCtx, {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            label: 'Revenue ($)',
            data: revenueData,
            borderColor: '#00C2CB',
            backgroundColor: 'rgba(0,194,203,0.08)',
            borderWidth: 2.5,
            pointBackgroundColor: '#00C2CB',
            pointRadius: 4,
            pointHoverRadius: 6,
            fill: true,
            tension: 0.4,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(48,54,61,0.5)' } },
            y: {
              grid: { color: 'rgba(48,54,61,0.5)' },
              ticks: { callback: v => '$' + v.toLocaleString() },
            },
          },
        },
      });
    }

    // Appointment Status Donut
    const aptCtx = document.getElementById('aptStatusChart');
    if (aptCtx) {
      new Chart(aptCtx, {
        type: 'doughnut',
        data: {
          labels: ['Pending', 'Confirmed', 'Completed', 'Cancelled'],
          datasets: [{
            data: [aptStats.pending, aptStats.confirmed, aptStats.completed, aptStats.cancelled],
            backgroundColor: ['#F59E0B', '#3B82F6', '#22C55E', '#EF4444'],
            borderWidth: 0,
            hoverOffset: 4,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          cutout: '72%',
          plugins: { legend: { display: false } },
        },
      });
    }

    // Department Bar Chart
    const depts = DB.departments.getAll();
    const aptsByDept = {};
    DB.appointments.getAll().forEach(a => {
      aptsByDept[a.department] = (aptsByDept[a.department] || 0) + 1;
    });

    const deptCtx = document.getElementById('deptChart');
    if (deptCtx) {
      new Chart(deptCtx, {
        type: 'bar',
        data: {
          labels: depts.map(d => d.name),
          datasets: [{
            label: 'Appointments',
            data: depts.map(d => aptsByDept[d.name] || 0),
            backgroundColor: [
              'rgba(0,194,203,0.7)', 'rgba(108,99,255,0.7)', 'rgba(34,197,94,0.7)',
              'rgba(245,158,11,0.7)', 'rgba(239,68,68,0.7)', 'rgba(59,130,246,0.7)',
              'rgba(236,72,153,0.7)', 'rgba(20,184,166,0.7)',
            ],
            borderRadius: 6,
            borderWidth: 0,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false } },
            y: { grid: { color: 'rgba(48,54,61,0.5)' }, beginAtZero: true },
          },
        },
      });
    }
  },

  renderReceptionistDashboard: () => {

  renderPharmacistDashboard: () => {

    const todayRevenue = todaySales.reduce((s, sale) => s + sale.total, 0);

                  <div style="font-size:0.75rem;color:var(--text-secondary)">${m.category}</div>
                </div>
                <span class="badge badge-danger">⚠ ${m.quantity} left</span>
              </div>
            `).join('')

        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">⏳ Expiring Soon</div>
          </div>
          ${expiring.length === 0
            ? `<div class="empty-state"><div class="empty-icon">✅</div><h4>No expiring medicines</h4></div>`
            : expiring.slice(0,5).map(m => `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border)">

                </div>
                <span class="badge badge-warning">⏳ ${Utils.daysUntil(m.expiryDate)}d</span>
              </div>
            `).join('')
          }
        </div>
      </div>
    `;
  },
};

</script>
<script>
// =========================================
// HMS — Patient Management Module
// =========================================

const Patients = {
  state: {
    list: [],
    filtered: [],
    editId: null,
    viewId: null,
    page: 1,
    perPage: 10,
    sortCol: 'name',
    sortDir: 'asc',
    searchQuery: '',
    filterGender: '',
    filterBlood: '',
    filterStatus: '',
  },

  init: () => {
    renderTopbar('Patient Management', 'Register and manage patient records');

    if (App.state.pendingAction === 'new') {
      App.state.pendingAction = null;
      setTimeout(() => Patients.openModal(), 300);
    }

    Patients.load();
    Patients.bindEvents();
  },

  load: () => {
    Patients.state.list = DB.patients.getAll();
    Patients.applyFilters();
  },

  applyFilters: () => {
    let data = [...Patients.state.list];
    const { searchQuery, filterGender, filterBlood, filterStatus } = Patients.state;

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      data = data.filter(p =>
        p.name?.toLowerCase().includes(q) ||
        p.id?.toLowerCase().includes(q) ||
        p.phone?.includes(q) ||
        p.bloodGroup?.toLowerCase().includes(q) ||
        p.address?.toLowerCase().includes(q)
      );
    }
    if (filterGender) data = data.filter(p => p.gender === filterGender);
    if (filterBlood) data = data.filter(p => p.bloodGroup === filterBlood);
    if (filterStatus) data = data.filter(p => p.status === filterStatus);

    // Sort
    data.sort((a, b) => {
      const col = Patients.state.sortCol;
      const dir = Patients.state.sortDir === 'asc' ? 1 : -1;
      const av = a[col] || '';
      const bv = b[col] || '';
      return av < bv ? -dir : av > bv ? dir : 0;
    });

    Patients.state.filtered = data;
    Patients.state.page = 1;
    Patients.renderTable();
    Patients.renderStats();
  },

  renderStats: () => {
    const all = Patients.state.list;
    const el = id => document.getElementById(id);
    if (el('stat-total')) el('stat-total').textContent = all.length;
    if (el('stat-admitted')) el('stat-admitted').textContent = all.filter(p => p.status === 'admitted').length;
    if (el('stat-today')) el('stat-today').textContent = all.filter(p => p.createdAt?.startsWith(Utils.today())).length;
    if (el('stat-male')) el('stat-male').textContent = all.filter(p => p.gender === 'Male').length;
  },

  renderTable: () => {
    const { filtered, page, perPage } = Patients.state;
    const start = (page - 1) * perPage;
    const pageData = filtered.slice(start, start + perPage);
    const tbody = document.getElementById('patients-tbody');
    if (!tbody) return;

    if (pageData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">👥</div><h4>No patients found</h4></div></td></tr>`;
    } else {
      tbody.innerHTML = pageData.map(p => `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div class="avatar avatar-sm" style="background:${Utils.avatarColor(p.name)}">${Utils.initials(p.name)}</div>
              <div>
                <div style="font-weight:600;color:var(--text-primary)">${p.name}</div>
                <div style="font-size:0.72rem;color:var(--text-secondary)">${p.id}</div>
              </div>
            </div>
          </td>
          <td>${p.age} yrs · ${p.gender}</td>
          <td>${Utils.bloodGroupBadge(p.bloodGroup)}</td>
          <td>${p.phone || '—'}</td>
          <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.address || '—'}</td>
          <td>${Utils.statusBadge(p.status || 'outpatient')}</td>
          <td>${Utils.formatDate(p.createdAt)}</td>
          <td>
            <div class="table-actions">
              <button class="btn btn-sm btn-secondary" onclick="Patients.view('${p.id}')" title="View">👁</button>
              <button class="btn btn-sm btn-secondary" onclick="Patients.openModal('${p.id}')" title="Edit">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="Patients.delete('${p.id}')" title="Delete">🗑</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    Patients.renderPagination();
  },

  renderPagination: () => {
    const { filtered, page, perPage } = Patients.state;
    const total = filtered.length;
    const totalPages = Math.ceil(total / perPage);
    const start = (page - 1) * perPage + 1;
    const end = Math.min(page * perPage, total);

    const infoEl = document.getElementById('pagination-info');
    const ctrlsEl = document.getElementById('pagination-controls');
    if (infoEl) infoEl.textContent = total === 0 ? 'No records' : `Showing ${start}–${end} of ${total}`;

    if (!ctrlsEl) return;
    ctrlsEl.innerHTML = '';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'page-btn';
    prevBtn.textContent = '‹';
    prevBtn.disabled = page === 1;
    prevBtn.onclick = () => { Patients.state.page--; Patients.renderTable(); };
    ctrlsEl.appendChild(prevBtn);

    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.className = `page-btn ${i === page ? 'active' : ''}`;
      btn.textContent = i;
      btn.onclick = () => { Patients.state.page = i; Patients.renderTable(); };
      ctrlsEl.appendChild(btn);
    }

    const nextBtn = document.createElement('button');
    nextBtn.className = 'page-btn';
    nextBtn.textContent = '›';
    nextBtn.disabled = page === totalPages || totalPages === 0;
    nextBtn.onclick = () => { Patients.state.page++; Patients.renderTable(); };
    ctrlsEl.appendChild(nextBtn);
  },

  bindEvents: () => {
    const search = document.getElementById('search-input');
    if (search) {
      search.addEventListener('input', Utils.debounce(e => {
        Patients.state.searchQuery = e.target.value;
        Patients.applyFilters();
      }, 300));
    }

    const genderFilter = document.getElementById('filter-gender');
    if (genderFilter) genderFilter.addEventListener('change', e => {
      Patients.state.filterGender = e.target.value;
      Patients.applyFilters();
    });

    const bloodFilter = document.getElementById('filter-blood');
    if (bloodFilter) bloodFilter.addEventListener('change', e => {
      Patients.state.filterBlood = e.target.value;
      Patients.applyFilters();
    });

    const statusFilter = document.getElementById('filter-status');
    if (statusFilter) statusFilter.addEventListener('change', e => {
      Patients.state.filterStatus = e.target.value;
      Patients.applyFilters();
    });

    // Sort on column header click
    document.querySelectorAll('.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (Patients.state.sortCol === col) {
          Patients.state.sortDir = Patients.state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          Patients.state.sortCol = col;
          Patients.state.sortDir = 'asc';
        }
        Patients.applyFilters();
      });
    });
  },

  openModal: (id = null) => {
    Patients.state.editId = id;
    const isEdit = !!id;
    const modal = document.getElementById('patient-modal');
    const title = document.getElementById('modal-title');
    const form = document.getElementById('patient-form');

    if (title) title.textContent = isEdit ? '✏️ Edit Patient' : '➕ Register New Patient';
    if (form) form.reset();

    if (isEdit) {
      const patient = DB.patients.getById(id);
      if (patient && form) {
        Utils.setFormData(form, patient);
      }
    }
    Utils.openModal('patient-modal');
  },

  save: () => {
    const form = document.getElementById('patient-form');
    if (!form) return;

    const data = Utils.getFormData(form);
    if (!data.name || !data.age || !data.gender || !data.phone) {
      Utils.toast.error('Please fill all required fields.');
      return;
    }

    if (Patients.state.editId) {
      DB.patients.update(Patients.state.editId, data);
      Utils.toast.success('Patient record updated successfully!');
    } else {
      const newPatient = {
        ...data,
        id: Utils.genPatientId(),
        status: 'outpatient',
        createdAt: Utils.now(),
      };
      DB.patients.insert(newPatient);
      Utils.toast.success(`Patient registered! ID: ${newPatient.id}`);
    }

    Utils.closeModal('patient-modal');
    Patients.load();
  },

  delete: (id) => {
    const patient = DB.patients.getById(id);
    Utils.confirm(
      `Delete patient <strong>${patient?.name}</strong>? This action cannot be undone.`,
      () => {
        DB.patients.delete(id);
        Utils.toast.success('Patient deleted successfully.');
        Patients.load();
      }
    );
  },

  view: (id) => {
    const patient = DB.patients.getById(id);
    if (!patient) return;

    const appointments = DB.appointments.getByPatient(id);
    const admissions = DB.admissions.getByPatient(id);
    const invoices = DB.invoices.getByPatient(id);

    const modal = document.getElementById('view-modal');
    const body = document.getElementById('view-modal-body');
    const titleEl = document.getElementById('view-modal-title');
    if (!modal || !body) return;

    if (titleEl) titleEl.textContent = `Patient: ${patient.name}`;

    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:20px;background:var(--bg-elevated);border-radius:var(--radius-lg);">
        <div class="avatar avatar-xl" style="background:${Utils.avatarColor(patient.name)}">${Utils.initials(patient.name)}</div>
        <div>
          <h3 style="margin-bottom:4px">${patient.name}</h3>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span class="badge badge-primary">${patient.id}</span>
            ${Utils.bloodGroupBadge(patient.bloodGroup)}
            ${Utils.statusBadge(patient.status || 'outpatient')}
          </div>
        </div>
      </div>

      <div class="form-row cols-3" style="margin-bottom:20px">
        ${[
          ['Age', `${patient.age} years`],
          ['Gender', patient.gender],
          ['Phone', patient.phone],
          ['Blood Group', patient.bloodGroup],
          ['Emergency Contact', patient.emergencyContact],
          ['Emergency Name', patient.emergencyName],
        ].map(([lbl, val]) => `
          <div>
            <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:4px">${lbl}</div>
            <div style="font-weight:600;color:var(--text-primary)">${val || '—'}</div>
          </div>
        `).join('')}
      </div>

      <div style="margin-bottom:20px">
        <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px">Address</div>
        <div style="color:var(--text-primary)">${patient.address || '—'}</div>
      </div>

      ${patient.medicalHistory ? `
        <div style="margin-bottom:20px">
          <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px">Medical History</div>
          <div class="badge badge-warning">${patient.medicalHistory}</div>
        </div>
      ` : ''}
      ${patient.allergies ? `
        <div style="margin-bottom:20px">
          <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px">Allergies</div>
          <div class="badge badge-danger">⚠ ${patient.allergies}</div>
        </div>
      ` : ''}

      <div class="divider"></div>

      <div class="tabs" style="margin-top:16px">
        <button class="tab-btn active" onclick="switchTab('tab-appts', this)">Appointments (${appointments.length})</button>
        <button class="tab-btn" onclick="switchTab('tab-admissions', this)">Admissions (${admissions.length})</button>
        <button class="tab-btn" onclick="switchTab('tab-invoices', this)">Invoices (${invoices.length})</button>
      </div>

      <div id="tab-appts" class="tab-content active">
        ${appointments.length === 0
          ? `<div class="empty-state"><div class="empty-icon">📅</div><h4>No appointments</h4></div>`
          : appointments.slice(0, 5).map(a => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
              <div>
                <div style="font-weight:600;font-size:0.875rem;color:var(--text-primary)">${a.doctorName}</div>
                <div style="font-size:0.75rem;color:var(--text-secondary)">${Utils.formatDate(a.date)} at ${Utils.formatTime(a.time)} · ${a.reason}</div>
              </div>
              ${Utils.statusBadge(a.status)}
            </div>
          `).join('')
        }
      </div>

      <div id="tab-admissions" class="tab-content">
        ${admissions.length === 0
          ? `<div class="empty-state"><div class="empty-icon">🏥</div><h4>No admissions</h4></div>`
          : admissions.map(a => `
            <div style="padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="display:flex;justify-content:space-between">
                <div style="font-weight:600;color:var(--text-primary)">Room ${a.roomNo} · ${a.roomType}</div>
                ${Utils.statusBadge(a.status)}
              </div>
              <div style="font-size:0.75rem;color:var(--text-secondary)">Admitted: ${Utils.formatDate(a.admitDate)} ${a.dischargeDate ? '· Discharged: '+Utils.formatDate(a.dischargeDate) : ''}</div>
            </div>
          `).join('')
        }
      </div>

      <div id="tab-invoices" class="tab-content">
        ${invoices.length === 0
          ? `<div class="empty-state"><div class="empty-icon">💰</div><h4>No invoices</h4></div>`
          : invoices.map(inv => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
              <div>
                <div style="font-weight:600;font-size:0.875rem;color:var(--text-primary)">${inv.id}</div>
                <div style="font-size:0.75rem;color:var(--text-secondary)">${Utils.formatDate(inv.date)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-weight:700;color:var(--primary)">${Utils.formatCurrency(inv.total)}</span>
                ${Utils.statusBadge(inv.status)}
              </div>
            </div>
          `).join('')
        }
      </div>
    `;

    Utils.openModal('view-modal');
  },
};

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tab = document.getElementById(tabId);
  if (tab) tab.classList.add('active');
  if (btn) btn.classList.add('active');
}

</script>
<script>
// =========================================
// HMS — Doctor Management Module
// =========================================

const Doctors = {
  state: {
    list: [],
    filtered: [],
    editId: null,
    searchQuery: '',
    filterDept: '',
    filterAvail: '',
  },

  init: () => {
    if (!Auth.hasRole('admin')) {
      Utils.toast.error('Admin access required.');
      App.navigate('dashboard');
      return;
    }
    renderTopbar('Doctor Management', 'Manage doctor profiles and schedules');
    Doctors.load();
    Doctors.bindEvents();
  },

  load: () => {
    Doctors.state.list = DB.doctors.getAll();
    Doctors.applyFilters();
  },

  applyFilters: () => {
    let data = [...Doctors.state.list];
    const { searchQuery, filterDept, filterAvail } = Doctors.state;

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      data = data.filter(d =>
        d.name?.toLowerCase().includes(q) ||
        d.id?.toLowerCase().includes(q) ||
        d.specialization?.toLowerCase().includes(q) ||
        d.department?.toLowerCase().includes(q)
      );
    }
    if (filterDept) data = data.filter(d => d.department === filterDept);
    if (filterAvail !== '') data = data.filter(d => String(d.available) === filterAvail);

    Doctors.state.filtered = data;
    Doctors.renderCards();
    Doctors.renderStats();
  },

  renderStats: () => {
    const all = Doctors.state.list;
    const el = id => document.getElementById(id);
    if (el('stat-total')) el('stat-total').textContent = all.length;
    if (el('stat-available')) el('stat-available').textContent = all.filter(d => d.available).length;
    if (el('stat-depts')) el('stat-depts').textContent = [...new Set(all.map(d => d.department))].length;
    if (el('stat-avg-exp')) {
      const avg = all.length ? Math.round(all.reduce((s, d) => s + (d.experience || 0), 0) / all.length) : 0;
      el('stat-avg-exp').textContent = avg + ' yrs';
    }
  },

  renderCards: () => {
    const container = document.getElementById('doctors-grid');
    if (!container) return;
    const { filtered } = Doctors.state;

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👨‍⚕️</div><h4>No doctors found</h4></div>`;
      return;
    }

    container.innerHTML = filtered.map(doc => {
      const todayApts = DB.appointments.getByDoctor(doc.id).filter(a => a.date === Utils.today()).length;
      const depts = DB.departments.getAll();
      return `
        <div class="card doctor-card animate-fade-in">
          <div class="card-body" style="padding:20px">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
              <div style="display:flex;align-items:center;gap:12px">
                <div class="avatar avatar-lg" style="background:${Utils.avatarColor(doc.name)}">${Utils.initials(doc.name)}</div>
                <div>
                  <div style="font-weight:700;font-size:1rem;color:var(--text-primary)">${doc.name}</div>
                  <div style="font-size:0.75rem;color:var(--text-secondary)">${doc.qualification}</div>
                  <div style="margin-top:4px">${Utils.statusBadge(doc.available ? 'active' : 'inactive')}</div>
                </div>
              </div>
              <div class="dropdown">
                <button class="btn btn-ghost btn-icon" onclick="toggleDoctorMenu('${doc.id}')">⋮</button>
                <div class="dropdown-menu hidden" id="menu-${doc.id}">
                  <div class="dropdown-item" onclick="Doctors.openModal('${doc.id}'); closeAllMenus()">✏️ Edit</div>
                  <div class="dropdown-item" onclick="Doctors.toggleAvailability('${doc.id}'); closeAllMenus()">
                    ${doc.available ? '⏸ Set Unavailable' : '▶ Set Available'}
                  </div>
                  <div class="dropdown-divider"></div>
                  <div class="dropdown-item danger" onclick="Doctors.delete('${doc.id}'); closeAllMenus()">🗑 Delete</div>
                </div>
              </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
              <div style="display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--text-secondary)">
                <span>🏥</span> <span style="color:var(--primary);font-weight:600">${doc.department}</span>
              </div>
              <div style="font-size:0.8rem;color:var(--text-secondary)">
                🔬 ${doc.specialization || '—'}
              </div>
              <div style="font-size:0.8rem;color:var(--text-secondary)">
                📞 ${doc.phone || '—'}
              </div>
              <div style="font-size:0.8rem;color:var(--text-secondary)">
                ⏱ ${doc.experience} yrs experience · $${doc.fee} consult fee
              </div>
            </div>

            <div style="background:var(--bg-elevated);border-radius:var(--radius-md);padding:12px;margin-bottom:16px">
              <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary);margin-bottom:8px">Schedule</div>
              <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">
                ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(day => `
                  <span style="font-size:0.65rem;padding:2px 6px;border-radius:4px;font-weight:600;
                    background:${doc.schedule?.days?.includes(day) ? 'var(--primary-glow)' : 'var(--bg-card)'};
                    color:${doc.schedule?.days?.includes(day) ? 'var(--primary)' : 'var(--text-muted)'}">
                    ${day}
                  </span>
                `).join('')}
              </div>
              <div style="font-size:0.75rem;color:var(--text-secondary)">
                🕐 ${doc.schedule?.startTime || '—'} – ${doc.schedule?.endTime || '—'}
              </div>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border)">
              <div style="font-size:0.75rem;color:var(--text-secondary)">📅 Today: <strong style="color:var(--text-primary)">${todayApts} appointments</strong></div>
              <span class="badge badge-primary">DOC ID: ${doc.id}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  },

  bindEvents: () => {
    const search = document.getElementById('search-input');
    if (search) {
      search.addEventListener('input', Utils.debounce(e => {
        Doctors.state.searchQuery = e.target.value;
        Doctors.applyFilters();
      }, 300));
    }

    const deptFilter = document.getElementById('filter-dept');
    if (deptFilter) {
      const depts = DB.departments.getAll();
      deptFilter.innerHTML = '<option value="">All Departments</option>' +
        depts.map(d => `<option>${d.name}</option>`).join('');
      deptFilter.addEventListener('change', e => {
        Doctors.state.filterDept = e.target.value;
        Doctors.applyFilters();
      });
    }

    const availFilter = document.getElementById('filter-avail');
    if (availFilter) availFilter.addEventListener('change', e => {
      Doctors.state.filterAvail = e.target.value;
      Doctors.applyFilters();
    });
  },

  openModal: (id = null) => {
    Doctors.state.editId = id;
    const isEdit = !!id;
    const modal = document.getElementById('doctor-modal');
    const title = document.getElementById('doctor-modal-title');
    const form = document.getElementById('doctor-form');

    // Populate department options
    const deptSel = form?.querySelector('[name="department"]');
    if (deptSel) {
      const depts = DB.departments.getAll();
      deptSel.innerHTML = '<option value="">Select Department</option>' +
        depts.map(d => `<option>${d.name}</option>`).join('') +
        '<option value="__new__">➕ Add new department…</option>';
      deptSel.onchange = () => {
        if (deptSel.value === '__new__') {
          const name = prompt('New department name:');
          if (name && name.trim()) {
            const dept = { id: Utils.genId('DEPT'), name: name.trim(), head: '' };
            DB.departments.insert(dept);
            const opt = document.createElement('option');
            opt.textContent = dept.name;
            deptSel.insertBefore(opt, deptSel.lastElementChild);
            deptSel.value = dept.name;
          } else {
            deptSel.value = '';
          }
        }
      };
    }

    if (title) title.textContent = isEdit ? '✏️ Edit Doctor' : '➕ Add New Doctor';
    if (form) form.reset();

    if (isEdit) {
      const doc = DB.doctors.getById(id);
      if (doc && form) {
        Utils.setFormData(form, { ...doc, days: doc.schedule?.days?.join(',') || '' });
        const daysInput = form.querySelector('[name="days"]');
        if (daysInput) daysInput.value = doc.schedule?.days?.join(', ') || '';
        const startInput = form.querySelector('[name="startTime"]');
        if (startInput) startInput.value = doc.schedule?.startTime || '';
        const endInput = form.querySelector('[name="endTime"]');
        if (endInput) endInput.value = doc.schedule?.endTime || '';
      }
    }
    Utils.openModal('doctor-modal');
  },

  save: () => {
    const form = document.getElementById('doctor-form');
    if (!form) return;

    const data = Utils.getFormData(form);
    if (!data.name || !data.department || !data.qualification) {
      Utils.toast.error('Please fill all required fields.');
      return;
    }

    const daysStr = data.days || '';
    const schedule = {
      days: daysStr.split(',').map(d => d.trim()).filter(Boolean),
      startTime: data.startTime || '',
      endTime: data.endTime || '',
    };
    delete data.days; delete data.startTime; delete data.endTime;

    const docData = { ...data, schedule, fee: parseFloat(data.fee) || 0, experience: parseInt(data.experience) || 0 };

    if (Doctors.state.editId) {
      DB.doctors.update(Doctors.state.editId, docData);
      Utils.toast.success('Doctor profile updated!');
    } else {
      DB.doctors.insert({
        ...docData,
        id: Utils.genDoctorId(),
        available: true,
        createdAt: Utils.now(),
      });
      Utils.toast.success('Doctor added successfully!');
    }

    Utils.closeModal('doctor-modal');
    Doctors.load();
  },

  delete: (id) => {
    const doc = DB.doctors.getById(id);
    Utils.confirm(
      `Delete <strong>${doc?.name}</strong>? All associated data may be affected.`,
      () => {
        DB.doctors.delete(id);
        Utils.toast.success('Doctor deleted.');
        Doctors.load();
      }
    );
  },

  toggleAvailability: (id) => {
    const doc = DB.doctors.getById(id);
    if (!doc) return;
    DB.doctors.update(id, { available: !doc.available });
    Utils.toast.info(`${doc.name} marked as ${!doc.available ? 'Available' : 'Unavailable'}`);
    Doctors.load();
  },
};

function toggleDoctorMenu(id) {
  closeAllMenus();
  const menu = document.getElementById(`menu-${id}`);
  if (menu) menu.classList.toggle('hidden');
}

function closeAllMenus() {
  document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.add('hidden'));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown')) closeAllMenus();
});

</script>
<script>
// =========================================
// HMS — Appointments Module
// =========================================

const Appointments = {
  state: {
    list: [],
    filtered: [],
    editId: null,
    searchQuery: '',
    filterStatus: '',
    filterDoctor: '',
    filterDate: '',
    page: 1,
    perPage: 12,
  },

  init: () => {
    renderTopbar('Appointments', 'Manage patient appointments and schedules');

    if (App.state.pendingAction === 'new') {
      App.state.pendingAction = null;
      setTimeout(() => Appointments.openModal(), 300);
    }

    Appointments.load();
    Appointments.bindEvents();
  },

  load: () => {
    const session = DB.session.get();
    let all = DB.appointments.getAll();

    // Doctors only see their own
    if (session?.role === 'doctor') {
      const user = DB.users.getById(session.userId);
      const doctorId = user?.doctorId || DB.doctors.getAll().find(d => d.email === session.email)?.id;
      if (doctorId) all = all.filter(a => a.doctorId === doctorId);
    }

    // Sort by date desc
    all.sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time));
    Appointments.state.list = all;
    Appointments.applyFilters();
    Appointments.renderStats();
  },

  applyFilters: () => {
    let data = [...Appointments.state.list];
    const { searchQuery, filterStatus, filterDoctor, filterDate } = Appointments.state;

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      data = data.filter(a =>
        a.patientName?.toLowerCase().includes(q) ||
        a.doctorName?.toLowerCase().includes(q) ||
        a.id?.toLowerCase().includes(q) ||
        a.reason?.toLowerCase().includes(q)
      );
    }
    if (filterStatus) data = data.filter(a => a.status === filterStatus);
    if (filterDoctor) data = data.filter(a => a.doctorId === filterDoctor);
    if (filterDate) data = data.filter(a => a.date === filterDate);

    Appointments.state.filtered = data;
    Appointments.state.page = 1;
    Appointments.renderTable();
  },

  renderStats: () => {
    const all = Appointments.state.list;
    const today = Utils.today();
    const el = id => document.getElementById(id);
    if (el('stat-total')) el('stat-total').textContent = all.length;
    if (el('stat-today')) el('stat-today').textContent = all.filter(a => a.date === today).length;
    if (el('stat-pending')) el('stat-pending').textContent = all.filter(a => a.status === 'pending').length;
    if (el('stat-completed')) el('stat-completed').textContent = all.filter(a => a.status === 'completed').length;
  },

  renderTable: () => {
    const { filtered, page, perPage } = Appointments.state;
    const start = (page - 1) * perPage;
    const pageData = filtered.slice(start, start + perPage);
    const tbody = document.getElementById('appointments-tbody');
    if (!tbody) return;

    if (pageData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📅</div><h4>No appointments found</h4></div></td></tr>`;
    } else {
      tbody.innerHTML = pageData.map(apt => `
        <tr>
          <td>
            <span class="badge badge-muted" style="font-size:0.7rem">${apt.id}</span>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="avatar avatar-sm" style="background:${Utils.avatarColor(apt.patientName)}">${Utils.initials(apt.patientName)}</div>
              <div>
                <div style="font-weight:600;color:var(--text-primary);font-size:0.875rem">${apt.patientName}</div>
              </div>
            </div>
          </td>
          <td>
            <div style="font-weight:600;font-size:0.875rem;color:var(--text-primary)">${apt.doctorName}</div>
            <div style="font-size:0.72rem;color:var(--text-secondary)">${apt.department}</div>
          </td>
          <td>
            <div style="font-weight:600;color:var(--text-primary)">${Utils.formatDate(apt.date)}</div>
            <div style="font-size:0.75rem;color:var(--primary)">${Utils.formatTime(apt.time)}</div>
          </td>
          <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8rem">${apt.reason || '—'}</td>
          <td>${Utils.formatCurrency(apt.fee)}</td>
          <td>${Utils.statusBadge(apt.status)}</td>
          <td>
            <div class="table-actions">
              ${Appointments.getActionButtons(apt)}
            </div>
          </td>
        </tr>
      `).join('');
    }
    Appointments.renderPagination();
  },

  getActionButtons: (apt) => {
    const session = DB.session.get();
    const role = session?.role;
    let btns = '';

    if (apt.status === 'pending') {
      btns += `<button class="btn btn-sm btn-success" onclick="Appointments.updateStatus('${apt.id}','confirmed')" title="Confirm">✓ Confirm</button>`;
    }
    if (apt.status === 'confirmed') {
      btns += `<button class="btn btn-sm btn-success" onclick="Appointments.updateStatus('${apt.id}','completed')" title="Complete">✔ Done</button>`;
    }
    if (['pending','confirmed'].includes(apt.status)) {
      btns += `<button class="btn btn-sm btn-warning" onclick="Appointments.openModal('${apt.id}')" title="Edit">✏️</button>`;
      btns += `<button class="btn btn-sm btn-danger" onclick="Appointments.updateStatus('${apt.id}','cancelled')" title="Cancel">✕</button>`;
    }
    if (apt.status === 'completed' && (role === 'admin' || role === 'receptionist')) {
      btns += `<button class="btn btn-sm btn-secondary" onclick="Appointments.generateInvoice('${apt.id}')" title="Invoice">💰 Invoice</button>`;
    }

    return btns || '<span style="color:var(--text-muted);font-size:0.75rem">No actions</span>';
  },

  renderPagination: () => {
    const { filtered, page, perPage } = Appointments.state;
    const total = filtered.length;
    const totalPages = Math.ceil(total / perPage);
    const start = (page - 1) * perPage + 1;
    const end = Math.min(page * perPage, total);

    const infoEl = document.getElementById('pagination-info');
    const ctrlsEl = document.getElementById('pagination-controls');
    if (infoEl) infoEl.textContent = total === 0 ? 'No records' : `Showing ${start}–${end} of ${total}`;
    if (!ctrlsEl) return;
    ctrlsEl.innerHTML = '';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'page-btn';
    prevBtn.textContent = '‹';
    prevBtn.disabled = page === 1;
    prevBtn.onclick = () => { Appointments.state.page--; Appointments.renderTable(); };
    ctrlsEl.appendChild(prevBtn);

    for (let i = 1; i <= Math.min(totalPages, 5); i++) {
      const btn = document.createElement('button');
      btn.className = `page-btn ${i === page ? 'active' : ''}`;
      btn.textContent = i;
      btn.onclick = () => { Appointments.state.page = i; Appointments.renderTable(); };
      ctrlsEl.appendChild(btn);
    }

    const nextBtn = document.createElement('button');
    nextBtn.className = 'page-btn';
    nextBtn.textContent = '›';
    nextBtn.disabled = page === totalPages || totalPages === 0;
    nextBtn.onclick = () => { Appointments.state.page++; Appointments.renderTable(); };
    ctrlsEl.appendChild(nextBtn);
  },

  bindEvents: () => {
    const search = document.getElementById('search-input');
    if (search) {
      search.addEventListener('input', Utils.debounce(e => {
        Appointments.state.searchQuery = e.target.value;
        Appointments.applyFilters();
      }, 300));
    }

    ['filter-status','filter-doctor','filter-date'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('change', e => {
        Appointments.state[{
          'filter-status': 'filterStatus',
          'filter-doctor': 'filterDoctor',
          'filter-date': 'filterDate',
        }[id]] = e.target.value;
        Appointments.applyFilters();
      });
    });

    // Populate doctor filter
    const doctorSel = document.getElementById('filter-doctor');
    if (doctorSel) {
      DB.doctors.getAll().forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.name;
        doctorSel.appendChild(opt);
      });
    }

    // Populate doctor select in modal
    const modalDoctorSel = document.getElementById('apt-doctor');
    if (modalDoctorSel) {
      modalDoctorSel.innerHTML = '<option value="">Select Doctor</option>' +
        DB.doctors.getAvailable().map(d => `<option value="${d.id}">${d.name} — ${d.department} ($${d.fee})</option>`).join('');
    }

    // Populate patient select in modal
    const modalPatientSel = document.getElementById('apt-patient');
    if (modalPatientSel) {
      modalPatientSel.innerHTML = '<option value="">Select Patient</option>' +
        DB.patients.getAll().map(p => `<option value="${p.id}">${p.name} (${p.id})</option>`).join('');
    }
  },

  openModal: (id = null) => {
    Appointments.state.editId = id;
    const isEdit = !!id;
    const titleEl = document.getElementById('apt-modal-title');
    const form = document.getElementById('apt-form');

    if (titleEl) titleEl.textContent = isEdit ? '✏️ Edit Appointment' : '📅 Book Appointment';
    if (form) form.reset();

    // Set min date to today
    const dateInput = form?.querySelector('[name="date"]');
    if (dateInput && !isEdit) dateInput.min = Utils.today();

    if (isEdit) {
      const apt = DB.appointments.getById(id);
      if (apt && form) {
        const aptDoc = form.querySelector('[name="doctorId"]');
        if (aptDoc) aptDoc.value = apt.doctorId;
        const aptPat = form.querySelector('[name="patientId"]');
        if (aptPat) aptPat.value = apt.patientId;
        Utils.setFormData(form, apt);
      }
    }
    Utils.openModal('apt-modal');
  },

  save: () => {
    const form = document.getElementById('apt-form');
    if (!form) return;

    const data = Utils.getFormData(form);
    if (!data.patientId || !data.doctorId || !data.date || !data.time) {
      Utils.toast.error('Please fill all required fields.');
      return;
    }

    const patient = DB.patients.getById(data.patientId);
    const doctor = DB.doctors.getById(data.doctorId);

    if (!patient || !doctor) {
      Utils.toast.error('Invalid patient or doctor selected.');
      return;
    }

    const aptData = {
      ...data,
      patientName: patient.name,
      doctorName: doctor.name,
      department: doctor.department,
      fee: doctor.fee,
    };

    if (Appointments.state.editId) {
      DB.appointments.update(Appointments.state.editId, aptData);
      Utils.toast.success('Appointment updated!');
    } else {
      DB.appointments.insert({
        ...aptData,
        id: 'APT-' + Date.now().toString().slice(-5),
        status: 'pending',
        createdAt: Utils.now(),
      });
      Utils.toast.success('Appointment booked successfully!');
    }

    Utils.closeModal('apt-modal');
    Appointments.load();
  },

  updateStatus: (id, newStatus) => {
    const apt = DB.appointments.getById(id);
    if (!apt) return;

    const labels = { confirmed: 'Confirm', completed: 'Complete', cancelled: 'Cancel' };
    Utils.confirm(
      `${labels[newStatus]} appointment for <strong>${apt.patientName}</strong> with ${apt.doctorName}?`,
      () => {
        DB.appointments.update(id, { status: newStatus });
        Utils.toast.success(`Appointment ${newStatus}!`);
        Appointments.load();
      }
    );
  },

  generateInvoice: (aptId) => {
    const apt = DB.appointments.getById(aptId);
    if (!apt) return;

    // Check if invoice already exists
    const existing = DB.invoices.getAll().find(inv => inv.appointmentId === aptId);
    if (existing) {
      Utils.toast.warning('Invoice already exists for this appointment.');
      App.navigate('billing');
      return;
    }

    const invoice = {
      id: Utils.genInvoiceId(),
      patientId: apt.patientId,
      patientName: apt.patientName,
      appointmentId: apt.id,
      doctorName: apt.doctorName,
      items: [{ description: 'Consultation Fee', amount: apt.fee || 0 }],
      subtotal: apt.fee || 0,
      discount: 0,
      total: apt.fee || 0,
      status: 'unpaid',
      method: null,
      date: apt.date,
      createdAt: Utils.now(),
    };

    DB.invoices.insert(invoice);
    Utils.toast.success(`Invoice ${invoice.id} created!`);
    App.navigate('billing');
  },

  clearFilters: () => {
    const search = document.getElementById('search-input');
    const status = document.getElementById('filter-status');
    const doctor = document.getElementById('filter-doctor');
    const date = document.getElementById('filter-date');
    if (search) search.value = '';
    if (status) status.value = '';
    if (doctor) doctor.value = '';
    if (date) date.value = '';
    Appointments.state.searchQuery = '';
    Appointments.state.filterStatus = '';
    Appointments.state.filterDoctor = '';
    Appointments.state.filterDate = '';
    Appointments.applyFilters();
  },
};

</script>
<script>
// =========================================
// HMS — Billing Module
// =========================================

const Billing = {
  state: {
    list: [],
    filtered: [],
    editId: null,
    searchQuery: '',
    filterStatus: '',
    page: 1,
    perPage: 10,
  },

  init: () => {
    renderTopbar('Billing & Invoices', 'Manage patient invoices and payment records');
    Billing.load();
    Billing.bindEvents();
  },

  load: () => {
    Billing.state.list = DB.invoices.getAll().sort((a,b) =>
      (b.createdAt || '').localeCompare(a.createdAt || ''));
    Billing.applyFilters();
    Billing.renderStats();
  },

  applyFilters: () => {
    let data = [...Billing.state.list];
    const { searchQuery, filterStatus } = Billing.state;

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      data = data.filter(inv =>
        inv.patientName?.toLowerCase().includes(q) ||
        inv.id?.toLowerCase().includes(q) ||
        inv.doctorName?.toLowerCase().includes(q)
      );
    }
    if (filterStatus) data = data.filter(inv => inv.status === filterStatus);

    Billing.state.filtered = data;
    Billing.state.page = 1;
    Billing.renderTable();
  },

  renderStats: () => {
    const all = Billing.state.list;
    const el = id => document.getElementById(id);
    const paid = all.filter(i => i.status === 'paid');
    const unpaid = all.filter(i => i.status === 'unpaid');
    const partial = all.filter(i => i.status === 'partial');

    if (el('stat-total-rev')) el('stat-total-rev').textContent = Utils.formatCurrency(paid.reduce((s,i) => s+(i.total||0), 0));
    if (el('stat-paid')) el('stat-paid').textContent = paid.length;
    if (el('stat-unpaid')) el('stat-unpaid').textContent = unpaid.length;
    if (el('stat-pending-amt')) el('stat-pending-amt').textContent =
      Utils.formatCurrency(unpaid.reduce((s,i) => s+(i.total||0), 0) + partial.reduce((s,i) => s+(i.total||0)*0.5, 0));
  },

  renderTable: () => {
    const { filtered, page, perPage } = Billing.state;
    const start = (page - 1) * perPage;
    const pageData = filtered.slice(start, start + perPage);
    const tbody = document.getElementById('billing-tbody');
    if (!tbody) return;

    if (pageData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">💰</div><h4>No invoices found</h4></div></td></tr>`;
    } else {
      tbody.innerHTML = pageData.map(inv => `
        <tr>
          <td><span class="badge badge-primary" style="font-size:0.7rem">${inv.id}</span></td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="avatar avatar-sm" style="background:${Utils.avatarColor(inv.patientName)}">${Utils.initials(inv.patientName)}</div>
              <span style="font-weight:600;color:var(--text-primary);font-size:0.875rem">${inv.patientName}</span>
            </div>
          </td>
          <td style="font-size:0.875rem">${inv.doctorName || '—'}</td>
          <td style="font-size:0.875rem">${Utils.formatDate(inv.date)}</td>
          <td>
            <div style="font-size:0.75rem;color:var(--text-secondary)">
              ${(inv.items || []).map(item => `${item.description}: ${Utils.formatCurrency(item.amount)}`).join('<br>')}
            </div>
          </td>
          <td style="font-weight:700;color:var(--primary)">${Utils.formatCurrency(inv.total)}</td>
          <td>${Utils.statusBadge(inv.status)}</td>
          <td>
            <div class="table-actions">
              <button class="btn btn-sm btn-secondary" onclick="Billing.viewInvoice('${inv.id}')" title="View">👁 View</button>
              ${inv.status !== 'paid'
                ? `<button class="btn btn-sm btn-success" onclick="Billing.markPaid('${inv.id}')" title="Mark Paid">✓ Pay</button>`
                : ''
              }
              <button class="btn btn-sm btn-secondary" onclick="Billing.printInvoice('${inv.id}')" title="Print">🖨 Print</button>
            </div>
          </td>
        </tr>
      `).join('');
    }
    Billing.renderPagination();
  },

  renderPagination: () => {
    const { filtered, page, perPage } = Billing.state;
    const total = filtered.length;
    const totalPages = Math.ceil(total / perPage);
    const start = (page - 1) * perPage + 1;
    const end = Math.min(page * perPage, total);

    const infoEl = document.getElementById('pagination-info');
    const ctrlsEl = document.getElementById('pagination-controls');
    if (infoEl) infoEl.textContent = total === 0 ? 'No records' : `Showing ${start}–${end} of ${total}`;
    if (!ctrlsEl) return;
    ctrlsEl.innerHTML = '';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'page-btn';
    prevBtn.textContent = '‹';
    prevBtn.disabled = page === 1;
    prevBtn.onclick = () => { Billing.state.page--; Billing.renderTable(); };
    ctrlsEl.appendChild(prevBtn);

    for (let i = 1; i <= Math.min(totalPages, 5); i++) {
      const btn = document.createElement('button');
      btn.className = `page-btn ${i === page ? 'active' : ''}`;
      btn.textContent = i;
      btn.onclick = () => { Billing.state.page = i; Billing.renderTable(); };
      ctrlsEl.appendChild(btn);
    }

    const nextBtn = document.createElement('button');
    nextBtn.className = 'page-btn';
    nextBtn.textContent = '›';
    nextBtn.disabled = page === totalPages || totalPages === 0;
    nextBtn.onclick = () => { Billing.state.page++; Billing.renderTable(); };
    ctrlsEl.appendChild(nextBtn);
  },

  bindEvents: () => {
    const search = document.getElementById('search-input');
    if (search) {
      search.addEventListener('input', Utils.debounce(e => {
        Billing.state.searchQuery = e.target.value;
        Billing.applyFilters();
      }, 300));
    }

    const statusFilter = document.getElementById('filter-status');
    if (statusFilter) statusFilter.addEventListener('change', e => {
      Billing.state.filterStatus = e.target.value;
      Billing.applyFilters();
    });
  },

  openNewModal: () => {
    const form = document.getElementById('new-invoice-form');
    if (form) form.reset();

    // Populate patient select
    const patSel = document.getElementById('inv-patient');
    if (patSel) {
      patSel.innerHTML = '<option value="">Select Patient</option>' +
        DB.patients.getAll().map(p => `<option value="${p.id}">${p.name} (${p.id})</option>`).join('');
    }

    // Reset line items (no prefilled values — user enters their own)
    const itemsContainer = document.getElementById('invoice-items');
    if (itemsContainer) {
      itemsContainer.innerHTML = `
        <div class="invoice-item" style="display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:8px">
          <input type="text" class="form-control item-desc" placeholder="Description (e.g. Consultation Fee)" />
          <input type="number" class="form-control item-amount" placeholder="Amount" style="width:120px" oninput="Billing.calcTotal()" />
          <button type="button" class="btn btn-danger btn-sm btn-icon" onclick="this.parentElement.remove();Billing.calcTotal()">✕</button>
        </div>
      `;
    }

    Billing.calcTotal();
    Utils.openModal('new-invoice-modal');
  },

  addLineItem: () => {
    const container = document.getElementById('invoice-items');
    if (!container) return;
    const div = document.createElement('div');
    div.className = 'invoice-item';
    div.style.cssText = 'display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:8px';
    div.innerHTML = `
      <input type="text" class="form-control item-desc" placeholder="Description (e.g. Lab Test)" />
      <input type="number" class="form-control item-amount" placeholder="Amount" value="0" style="width:120px" oninput="Billing.calcTotal()" />
      <button type="button" class="btn btn-danger btn-sm btn-icon" onclick="this.parentElement.remove();Billing.calcTotal()">✕</button>
    `;
    container.appendChild(div);
  },

  calcTotal: () => {
    const amounts = [...document.querySelectorAll('.item-amount')].map(el => parseFloat(el.value) || 0);
    const subtotal = amounts.reduce((s, a) => s + a, 0);
    const discount = parseFloat(document.getElementById('inv-discount')?.value) || 0;
    const total = Math.max(0, subtotal - discount);
    const el = document.getElementById('inv-total-display');
    if (el) el.textContent = Utils.formatCurrency(total);
  },

  saveNewInvoice: () => {
    const patientId = document.getElementById('inv-patient')?.value;
    const method = document.getElementById('inv-method')?.value;
    const discount = parseFloat(document.getElementById('inv-discount')?.value) || 0;

    if (!patientId) {
      Utils.toast.error('Please select a patient.');
      return;
    }

    const patient = DB.patients.getById(patientId);
    const items = [...document.querySelectorAll('.invoice-item')].map(div => ({
      description: div.querySelector('.item-desc')?.value || 'Service',
      amount: parseFloat(div.querySelector('.item-amount')?.value) || 0,
    })).filter(item => item.amount > 0);

    if (items.length === 0) {
      Utils.toast.error('Add at least one line item.');
      return;
    }

    const subtotal = items.reduce((s, i) => s + i.amount, 0);
    const total = Math.max(0, subtotal - discount);
    const status = method ? 'paid' : 'unpaid';

    const invoice = {
      id: Utils.genInvoiceId(),
      patientId,
      patientName: patient.name,
      appointmentId: null,
      doctorName: null,
      items,
      subtotal,
      discount,
      total,
      status,
      method: method || null,
      date: Utils.today(),
      createdAt: Utils.now(),
      paidAt: status === 'paid' ? Utils.now() : null,
    };

    DB.invoices.insert(invoice);
    Utils.toast.success(`Invoice ${invoice.id} created!`);
    Utils.closeModal('new-invoice-modal');
    Billing.load();
  },

  markPaid: (id) => {
    const inv = DB.invoices.getById(id);
    if (!inv) return;

    // Show payment method dialog
    const modal = document.createElement('div');
    modal.className = 'modal-overlay open';
    modal.innerHTML = `
      <div class="modal modal-sm">
        <div class="modal-header">
          <div class="modal-title">💳 Mark Invoice as Paid</div>
        </div>
        <div class="modal-body">
          <p style="color:var(--text-primary);margin-bottom:16px">Invoice: <strong>${inv.id}</strong> — ${Utils.formatCurrency(inv.total)}</p>
          <div class="form-group">
            <label class="form-label">Payment Method</label>
            <select class="form-control" id="pay-method">
              <option value="cash">💵 Cash</option>
              <option value="card">💳 Card</option>
              <option value="bank_transfer">🏦 Bank Transfer</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button class="btn btn-success" onclick="Billing.confirmPayment('${id}', document.getElementById('pay-method').value); this.closest('.modal-overlay').remove()">
            ✓ Confirm Payment
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  },

  confirmPayment: (id, method) => {
    DB.invoices.update(id, { status: 'paid', method, paidAt: Utils.now() });
    Utils.toast.success('Payment recorded successfully!');
    Billing.load();
  },

  viewInvoice: (id) => {
    const inv = DB.invoices.getById(id);
    if (!inv) return;

    const modal = document.getElementById('view-invoice-modal');
    const body = document.getElementById('view-invoice-body');
    if (!modal || !body) return;

    body.innerHTML = `
      <div id="printable-invoice" style="max-width:600px;margin:0 auto">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid var(--border)">
          <div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem">🏥</div>
              <div>
                <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:1.1rem">HMS Pro Hospital</div>
                <div style="font-size:0.72rem;color:var(--text-secondary)">123 Medical Center Drive, New York, USA</div>
              </div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:900;color:var(--primary)">INVOICE</div>
            <div style="font-size:0.875rem;color:var(--text-secondary)">${inv.id}</div>
            <div style="font-size:0.8rem;color:var(--text-secondary)">Date: ${Utils.formatDate(inv.date)}</div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
          <div>
            <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px">Bill To</div>
            <div style="font-weight:700;color:var(--text-primary)">${inv.patientName}</div>
            <div style="font-size:0.8rem;color:var(--text-secondary)">Patient ID: ${inv.patientId}</div>
          </div>
          <div style="text-align:right">
            ${inv.doctorName ? `<div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px">Doctor</div><div style="font-weight:700;color:var(--text-primary)">${inv.doctorName}</div>` : ''}
            <div style="font-size:0.8rem;color:var(--text-secondary)">Appt: ${inv.appointmentId || 'Manual Invoice'}</div>
          </div>
        </div>

        <table style="width:100%;border-collapse:collapse;margin-bottom:16px">
          <thead>
            <tr style="border-bottom:2px solid var(--border)">
              <th style="text-align:left;padding:8px 0;font-size:0.75rem;font-weight:700;text-transform:uppercase;color:var(--text-secondary)">Description</th>
              <th style="text-align:right;padding:8px 0;font-size:0.75rem;font-weight:700;text-transform:uppercase;color:var(--text-secondary)">Amount</th>
            </tr>
          </thead>
          <tbody>
            ${(inv.items || []).map(item => `
              <tr style="border-bottom:1px solid var(--border)">
                <td style="padding:10px 0;color:var(--text-primary)">${item.description}</td>
                <td style="padding:10px 0;text-align:right;color:var(--text-primary)">${Utils.formatCurrency(item.amount)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>

        <div style="display:flex;justify-content:flex-end">
          <div style="min-width:200px">
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.875rem;color:var(--text-secondary)">
              <span>Subtotal</span><span>${Utils.formatCurrency(inv.subtotal)}</span>
            </div>
            ${inv.discount ? `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.875rem;color:var(--success)">
              <span>Discount</span><span>-${Utils.formatCurrency(inv.discount)}</span>
            </div>` : ''}
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:2px solid var(--border);font-size:1rem;font-weight:800;color:var(--primary)">
              <span>TOTAL</span><span>${Utils.formatCurrency(inv.total)}</span>
            </div>
          </div>
        </div>

        <div style="margin-top:20px;padding:12px 16px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:space-between;
          background:${inv.status==='paid' ? 'var(--success-bg)' : 'var(--danger-bg)'};
          border:1px solid ${inv.status==='paid' ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)'}">
          <div style="font-weight:700;color:${inv.status==='paid' ? 'var(--success)' : 'var(--danger)'}">
            ${inv.status === 'paid' ? '✅ PAID' : '❌ UNPAID'}
          </div>
          <div style="font-size:0.8rem;color:var(--text-secondary)">
            ${inv.method ? `Payment: ${inv.method.replace('_', ' ').toUpperCase()}` : ''}
            ${inv.paidAt ? ' · ' + Utils.formatDate(inv.paidAt) : ''}
          </div>
        </div>
      </div>
    `;

    Utils.openModal('view-invoice-modal');
  },

  printInvoice: (id) => {
    Billing.viewInvoice(id);
    setTimeout(() => {
      const el = document.getElementById('printable-invoice');
      if (el) Utils.printElement(el);
    }, 500);
  },
};

</script>
<script>
// =========================================
// HMS — Pharmacy Module
// =========================================

const Pharmacy = {
  state: {
    list: [],
    filtered: [],
    editId: null,
    searchQuery: '',
    filterCategory: '',
    filterStatus: '',
    activeTab: 'inventory',
    page: 1,
    perPage: 10,
  },

  init: () => {
    renderTopbar('Pharmacy Management', 'Manage medicine inventory and sales');
    Pharmacy.load();
    Pharmacy.loadSales();
    Pharmacy.bindEvents();
  },

  load: () => {
    Pharmacy.state.list = DB.medicines.getAll();
    Pharmacy.applyFilters();
    Pharmacy.renderStats();
  },

  loadSales: () => {
    const sales = DB.sales.getAll().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const tbody = document.getElementById('sales-tbody');
    if (!tbody) return;

    if (sales.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">💊</div><h4>No sales recorded</h4></div></td></tr>`;
      return;
    }

    tbody.innerHTML = sales.slice(0, 20).map(s => `
      <tr>
        <td><span class="badge badge-muted" style="font-size:0.7rem">${s.id}</span></td>
        <td style="font-weight:600;color:var(--text-primary)">${s.medicineName}</td>
        <td>${s.patientName || '—'}</td>
        <td style="text-align:center">${s.quantity}</td>
        <td style="font-weight:700;color:var(--success)">${Utils.formatCurrency(s.total)}</td>
        <td style="font-size:0.8rem;color:var(--text-secondary)">${Utils.formatDateTime(s.date)}</td>
      </tr>
    `).join('');
  },

  applyFilters: () => {
    let data = [...Pharmacy.state.list];
    const { searchQuery, filterCategory, filterStatus } = Pharmacy.state;

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      data = data.filter(m =>
        m.name?.toLowerCase().includes(q) ||
        m.id?.toLowerCase().includes(q) ||
        m.category?.toLowerCase().includes(q)
      );
    }
    if (filterCategory) data = data.filter(m => m.category === filterCategory);
    if (filterStatus === 'low') data = data.filter(m => m.quantity <= (m.threshold || 10));
    else if (filterStatus === 'expiring') data = data.filter(m => Utils.isExpiringSoon(m.expiryDate, 30));
    else if (filterStatus === 'expired') data = data.filter(m => Utils.isExpired(m.expiryDate));
    else if (filterStatus === 'ok') data = data.filter(m => m.quantity > (m.threshold || 10) && !Utils.isExpiringSoon(m.expiryDate, 30));

    Pharmacy.state.filtered = data;
    Pharmacy.state.page = 1;
    Pharmacy.renderTable();
  },

  renderStats: () => {
    const all = Pharmacy.state.list;
    const el = id => document.getElementById(id);
    const totalValue = all.reduce((s,m) => s + (m.price * m.quantity), 0);
    if (el('stat-total')) el('stat-total').textContent = all.length;
    if (el('stat-low-stock')) el('stat-low-stock').textContent = DB.medicines.getLowStock().length;
    if (el('stat-expiring')) el('stat-expiring').textContent = DB.medicines.getExpiring(30).length;
    if (el('stat-inventory-val')) el('stat-inventory-val').textContent = Utils.formatCurrency(totalValue);
  },

  getStockStatus: (med) => {
    if (Utils.isExpired(med.expiryDate)) return { label: 'Expired', cls: 'badge-danger', icon: '💀' };
    if (med.quantity <= (med.threshold || 10)) return { label: 'Low Stock', cls: 'badge-danger', icon: '⚠' };
    if (Utils.isExpiringSoon(med.expiryDate, 30)) return { label: 'Expiring Soon', cls: 'badge-warning', icon: '⏳' };
    return { label: 'In Stock', cls: 'badge-success', icon: '●' };
  },

  renderTable: () => {
    const { filtered, page, perPage } = Pharmacy.state;
    const start = (page - 1) * perPage;
    const pageData = filtered.slice(start, start + perPage);
    const tbody = document.getElementById('pharmacy-tbody');
    if (!tbody) return;

    if (pageData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">💊</div><h4>No medicines found</h4></div></td></tr>`;
    } else {
      tbody.innerHTML = pageData.map(med => {
        const status = Pharmacy.getStockStatus(med);
        const stockPct = Math.min(100, (med.quantity / ((med.threshold || 10) * 5)) * 100);
        const expiryDays = Utils.daysUntil(med.expiryDate);
        return `
          <tr>
            <td><span class="badge badge-muted" style="font-size:0.7rem">${med.id}</span></td>
            <td>
              <div style="font-weight:600;color:var(--text-primary)">${med.name}</div>
              <div style="font-size:0.72rem;color:var(--text-secondary)">${med.supplier || '—'}</div>
            </td>
            <td><span class="badge badge-accent">${med.category}</span></td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div style="flex:1;min-width:60px">
                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${stockPct}%;background:${med.quantity <= (med.threshold||10) ? 'var(--danger)' : 'linear-gradient(90deg,var(--primary),var(--accent))'}"></div>
                  </div>
                </div>
                <strong style="color:${med.quantity <= (med.threshold||10) ? 'var(--danger)' : 'var(--text-primary)'};font-size:0.875rem">${med.quantity}</strong>
              </div>
            </td>
            <td style="font-weight:700;color:var(--primary)">${Utils.formatCurrency(med.price)}</td>
            <td>
              <div style="font-size:0.8rem;color:${expiryDays <= 0 ? 'var(--danger)' : expiryDays <= 30 ? 'var(--warning)' : 'var(--text-secondary)'}">
                ${Utils.formatDate(med.expiryDate)}
                ${expiryDays > 0 && expiryDays <= 60 ? `<br><span style="font-size:0.7rem">(${expiryDays}d left)</span>` : ''}
                ${expiryDays <= 0 ? `<br><span style="font-size:0.7rem">EXPIRED</span>` : ''}
              </div>
            </td>
            <td><span class="badge ${status.cls}">${status.icon} ${status.label}</span></td>
            <td style="font-size:0.8rem;color:var(--text-secondary)">${med.threshold || 10}</td>
            <td>
              <div class="table-actions">
                <button class="btn btn-sm btn-success" onclick="Pharmacy.openSaleModal('${med.id}')" title="Sell">💊 Sell</button>
                <button class="btn btn-sm btn-secondary" onclick="Pharmacy.openModal('${med.id}')" title="Edit">✏️</button>
                <button class="btn btn-sm btn-danger" onclick="Pharmacy.delete('${med.id}')" title="Delete">🗑</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }
    Pharmacy.renderPagination();
  },

  renderPagination: () => {
    const { filtered, page, perPage } = Pharmacy.state;
    const total = filtered.length;
    const totalPages = Math.ceil(total / perPage);
    const start = (page - 1) * perPage + 1;
    const end = Math.min(page * perPage, total);

    const infoEl = document.getElementById('pagination-info');
    const ctrlsEl = document.getElementById('pagination-controls');
    if (infoEl) infoEl.textContent = total === 0 ? 'No records' : `Showing ${start}–${end} of ${total}`;
    if (!ctrlsEl) return;
    ctrlsEl.innerHTML = '';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'page-btn';
    prevBtn.textContent = '‹';
    prevBtn.disabled = page === 1;
    prevBtn.onclick = () => { Pharmacy.state.page--; Pharmacy.renderTable(); };
    ctrlsEl.appendChild(prevBtn);

    for (let i = 1; i <= Math.min(totalPages, 5); i++) {
      const btn = document.createElement('button');
      btn.className = `page-btn ${i === page ? 'active' : ''}`;
      btn.textContent = i;
      btn.onclick = () => { Pharmacy.state.page = i; Pharmacy.renderTable(); };
      ctrlsEl.appendChild(btn);
    }

    const nextBtn = document.createElement('button');
    nextBtn.className = 'page-btn';
    nextBtn.textContent = '›';
    nextBtn.disabled = page === totalPages || totalPages === 0;
    nextBtn.onclick = () => { Pharmacy.state.page++; Pharmacy.renderTable(); };
    ctrlsEl.appendChild(nextBtn);
  },

  bindEvents: () => {
    const search = document.getElementById('search-input');
    if (search) {
      search.addEventListener('input', Utils.debounce(e => {
        Pharmacy.state.searchQuery = e.target.value;
        Pharmacy.applyFilters();
      }, 300));
    }

    const catFilter = document.getElementById('filter-category');
    if (catFilter) catFilter.addEventListener('change', e => {
      Pharmacy.state.filterCategory = e.target.value;
      Pharmacy.applyFilters();
    });

    const statFilter = document.getElementById('filter-status');
    if (statFilter) statFilter.addEventListener('change', e => {
      Pharmacy.state.filterStatus = e.target.value;
      Pharmacy.applyFilters();
    });
  },

  openModal: (id = null) => {
    Pharmacy.state.editId = id;
    const isEdit = !!id;
    const title = document.getElementById('med-modal-title');
    const form = document.getElementById('medicine-form');

    if (title) title.textContent = isEdit ? '✏️ Edit Medicine' : '➕ Add Medicine';
    if (form) form.reset();

    if (isEdit) {
      const med = DB.medicines.getById(id);
      if (med && form) Utils.setFormData(form, med);
    }
    Utils.openModal('medicine-modal');
  },

  save: () => {
    const form = document.getElementById('medicine-form');
    if (!form) return;
    const data = Utils.getFormData(form);

    if (!data.name || !data.category || !data.price) {
      Utils.toast.error('Please fill all required fields.');
      return;
    }

    const medData = {
      ...data,
      quantity: parseInt(data.quantity) || 0,
      price: parseFloat(data.price) || 0,
      threshold: parseInt(data.threshold) || 10,
    };

    if (Pharmacy.state.editId) {
      DB.medicines.update(Pharmacy.state.editId, medData);
      Utils.toast.success('Medicine updated!');
    } else {
      DB.medicines.insert({
        ...medData,
        id: Utils.genMedId(),
        createdAt: Utils.now(),
      });
      Utils.toast.success('Medicine added to inventory!');
    }

    Utils.closeModal('medicine-modal');
    Pharmacy.load();
  },

  delete: (id) => {
    const med = DB.medicines.getById(id);
    Utils.confirm(
      `Delete <strong>${med?.name}</strong> from inventory?`,
      () => {
